name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  mechanical-checks:
    name: Mechanical Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docs links
        run: bash scripts/check-docs-links.sh

      - name: Check PRD/ADR index
        run: bash scripts/check-prd-adr-index.sh

      - name: Check frontend hardware access
        run: bash scripts/check-frontend-hardware.sh

      - name: Check realtime CSV writers
        run: bash scripts/check-realtime-csv.sh

      - name: Check AGENTS.md presence
        run: bash scripts/check-agents-md.sh

      - name: Check repository consistency
        run: bash scripts/check-consistency.sh

  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check schema examples
        run: bash scripts/check-schema-examples.sh

      - name: Check command catalog
        run: bash scripts/check-command-catalog.sh
